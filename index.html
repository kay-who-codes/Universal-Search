<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Universal Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
    --bg-color: #121212;
    --card-bg: #1e1e1e;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0a0;
    --accent-color: #ff8000;
    --accent-hover: #9a67ea;
    --input-bg: #2d2d2d;
    --input-border: #3d3d3d;
    --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    line-height: 1.6;
}

.container {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
}

header {
    text-align: center;
    margin-bottom: 2rem;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(90deg, var(--accent-color), #03dac6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.subtitle {
    color: var(--text-secondary);
    font-size: 1rem;
}

.search-box {
    margin-bottom: 2rem;
}

.input-group {
    display: flex;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: var(--shadow);
}

#search-input {
    flex: 1;
    padding: 15px 20px;
    border: none;
    background-color: var(--input-bg);
    color: var(--text-primary);
    font-size: 1rem;
    outline: none;
}

#search-input::placeholder {
    color: var(--text-secondary);
}

#search-button {
    padding: 0 25px;
    border: none;
    background-color: var(--accent-color);
    color: white;
    cursor: pointer;
    transition: background-color 0.3s;
}

#search-button:hover {
    background-color: var(--accent-hover);
}

.search-options {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 15px;
    margin-top: 1.5rem;
}

.search-option {
    background-color: var(--card-bg);
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.search-option:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
}

.search-option i {
    font-size: 1.8rem;
    margin-bottom: 10px;
}

.search-option .name {
    font-size: 0.9rem;
    font-weight: 500;
}

/* Bookmarks Section Styles */
.bookmarks-section {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--input-border);
}

.bookmarks-header {
    text-align: center;
    margin-bottom: 2rem;
}

.bookmarks-header h2 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(90deg, #03dac6, var(--accent-color));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.bookmarks-search {
    margin-bottom: 2rem;
}

.bookmarks-search input {
    width: 100%;
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    background-color: var(--input-bg);
    color: var(--text-primary);
    font-size: 0.95rem;
    outline: none;
    box-shadow: var(--shadow);
}

.bookmarks-search input::placeholder {
    color: var(--text-secondary);
}

.bookmarks-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.bookmark-category {
    background-color: var(--card-bg);
    border-radius: 10px;
    padding: 20px;
    box-shadow: var(--shadow);
}

.bookmark-category.hidden {
    display: none;
}

.category-header {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid;
}

.bookmark-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.bookmark-item {
    color: var(--text-primary);
    text-decoration: none;
    font-size: 0.95rem;
    transition: color 0.2s, transform 0.2s;
    display: block;
    padding: 4px 0;
}

.bookmark-item:hover {
    transform: translateX(5px);
    opacity: 0.8;
}

.bookmark-item.hidden {
    display: none;
}

.no-results {
    text-align: center;
    color: var(--text-secondary);
    padding: 40px 20px;
    font-size: 1.1rem;
    display: none;
}

.no-results.show {
    display: block;
}

footer {
    text-align: center;
    margin-top: 3rem;
    color: var(--text-secondary);
    font-size: 0.9rem;
}

footer i {
    color: #ff5555;
}

@media (max-width: 600px) {
    .search-options {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    }
    
    .bookmarks-container {
        grid-template-columns: 1fr;
    }
    
    h1 {
        font-size: 2rem;
    }
}
    </style>

                </div>

                <div class="no-results" id="no-results">

                </div>

        </main>

        <footer>
            <p>Made with <i class="fas fa-heart"></i> for easy searching</p>

const categoryColors = {

// DOM elements
const searchInput = document.getElementById('search-input');
const searchButton = document.getElementById('search-button');
const searchOptionsContainer = document.querySelector('.search-options');
const bookmarksSearchInput = document.getElementById('bookmarks-search-input');
const bookmarksContainer = document.getElementById('bookmarks-container');
const noResults = document.getElementById('no-results');

// Initialize the app
function init() {
    renderSearchOptions();
    renderBookmarks();
    setupEventListeners();
}

// Render search options
function renderSearchOptions() {
    searchOptionsContainer.innerHTML = '';
    
    searchOptions.forEach(option => {
        const optionElement = document.createElement('div');
        optionElement.className = 'search-option';
        optionElement.dataset.url = option.url;
        optionElement.innerHTML = `
            <i class="${option.icon}" style="color: ${option.color}"></i>
            <span class="name">${option.name}</span>
        `;
        searchOptionsContainer.appendChild(optionElement);
    });
}

// Render bookmarks
function renderBookmarks() {
    bookmarksContainer.innerHTML = '';
    
    // Group bookmarks by category
    const bookmarksByCategory = {};
    bookmarks.forEach(bookmark => {
        if (!bookmarksByCategory[bookmark.category]) {
            bookmarksByCategory[bookmark.category] = [];
        }
        bookmarksByCategory[bookmark.category].push(bookmark);
    });
    
    // Create category cards
    Object.keys(bookmarksByCategory).forEach(category => {
        const categoryCard = document.createElement('div');
        categoryCard.className = 'bookmark-category';
        categoryCard.dataset.category = category;
        
        const categoryColor = categoryColors[category] || '#808080';
        
        const categoryHeader = document.createElement('div');
        categoryHeader.className = 'category-header';
        categoryHeader.style.borderColor = categoryColor;
        categoryHeader.style.color = categoryColor;
        categoryHeader.textContent = category;
        
        const bookmarkList = document.createElement('div');
        bookmarkList.className = 'bookmark-list';
        
        bookmarksByCategory[category].forEach(bookmark => {
            const bookmarkLink = document.createElement('a');
            bookmarkLink.href = bookmark.url;
            bookmarkLink.className = 'bookmark-item';
            bookmarkLink.target = '_blank';
            bookmarkLink.textContent = bookmark.name;
            bookmarkLink.dataset.name = bookmark.name.toLowerCase();
            bookmarkLink.dataset.tags = bookmark.tags.join(' ').toLowerCase();
            bookmarkLink.style.color = categoryColor;
            
            bookmarkList.appendChild(bookmarkLink);
        });
        
        categoryCard.appendChild(categoryHeader);
        categoryCard.appendChild(bookmarkList);
        bookmarksContainer.appendChild(categoryCard);
    });
}

// Filter bookmarks
function filterBookmarks(searchTerm) {
    const term = searchTerm.toLowerCase().trim();
    const categories = document.querySelectorAll('.bookmark-category');
    let visibleCount = 0;
    
    if (term === '') {
        // Show all
        categories.forEach(category => {
            category.classList.remove('hidden');
            const bookmarkItems = category.querySelectorAll('.bookmark-item');
            bookmarkItems.forEach(item => item.classList.remove('hidden'));
        });
        noResults.classList.remove('show');
        return;
    }
    
    categories.forEach(category => {
        const bookmarkItems = category.querySelectorAll('.bookmark-item');
        let categoryHasVisibleItems = false;
        
        bookmarkItems.forEach(item => {
            const name = item.dataset.name;
            const tags = item.dataset.tags;
            
            if (name.includes(term) || tags.includes(term)) {
                item.classList.remove('hidden');
                categoryHasVisibleItems = true;
                visibleCount++;
            } else {
                item.classList.add('hidden');
            }
        });
        
        if (categoryHasVisibleItems) {
            category.classList.remove('hidden');
        } else {
            category.classList.add('hidden');
        }
    });
    
    if (visibleCount === 0) {
        noResults.classList.add('show');
    } else {
        noResults.classList.remove('show');
    }
}

// Setup event listeners
function setupEventListeners() {
    // Search button click
    searchButton.addEventListener('click', performSearch);
    
    // Enter key in search input
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            performSearch();
        }
    });
    
    // Search option clicks
    document.querySelectorAll('.search-option').forEach(option => {
        option.addEventListener('click', function() {
            const searchUrl = this.dataset.url;
            performSearch(searchUrl);
        });
    });
    
    // Bookmarks search
    bookmarksSearchInput.addEventListener('input', (e) => {
        filterBookmarks(e.target.value);
    });
}

// Perform the search
function performSearch(customUrl = null) {
    const searchTerm = searchInput.value.trim();
    
    if (!searchTerm) {
        searchInput.focus();
        return;
    }
    
    // If a custom URL is provided (from clicking an option), use that
    // Otherwise use the first search option (Google) as default
    const searchUrl = customUrl || searchOptions[0].url;
    window.open(searchUrl + encodeURIComponent(searchTerm), '_blank');
}

// Initialize the app when DOM is loaded
document.addEventListener('DOMContentLoaded', init);
