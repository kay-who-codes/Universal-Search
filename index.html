    <style>
        :root {
    --bg-color: #121212;
    --card-bg: #1e1e1e;
    --text-primary: lightgrey;
    --text-secondary: #a0a0a0;
    --accent-color: #ff8000;
    --accent-hover: #9a67ea;
    --input-bg: #2d2d2d;
    --input-border: #3d3d3d;
    --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
    line-height: 1.6;
}

.container {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
}

/* ── Nav Toggle ── */
.nav-toggle {
    display: flex;
    justify-content: center;
    margin-bottom: 2rem;
    background-color: var(--input-bg);
    border-radius: 30px;
    padding: 5px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
    box-shadow: var(--shadow);
}

.nav-btn {
    padding: 10px 32px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    transition: background-color 0.25s, color 0.25s;
    background: transparent;
    color: var(--text-secondary);
    letter-spacing: 0.03em;
}

.nav-btn.active {
    background-color: var(--accent-color);
    color: #fff;
}

.nav-btn:not(.active):hover {
    color: var(--text-primary);
}

/* ── Section visibility ── */
.section-panel {
    display: none;
}
.section-panel.visible {
    display: block;
}

header {
    text-align: center;
    margin-bottom: 2rem;
}

h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(90deg, var(--accent-color), #03dac6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.subtitle {
    color: var(--text-secondary);
    font-size: 1rem;
}

.search-box {
    margin-bottom: 2rem;
}

.input-group {
    display: flex;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: var(--shadow);
}

#search-input {
    flex: 1;
    padding: 15px 20px;
    border: none;
    background-color: var(--input-bg);
    color: var(--text-primary);
    font-size: 1rem;
    outline: none;
}

#search-input::placeholder {
    color: var(--text-secondary);
}

#search-button {
    padding: 0 25px;
    border: none;
    background-color: var(--accent-color);
    color: white;
    cursor: pointer;
    transition: background-color 0.3s;
}

#search-button:hover {
    background-color: var(--accent-hover);
}

.search-options {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 15px;
    margin-top: 1.5rem;
}

.search-option {
    background-color: var(--card-bg);
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.search-option:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
}

.search-option i {
    font-size: 1.8rem;
    margin-bottom: 10px;
}

.search-option .name {
    font-size: 0.9rem;
    font-weight: 500;
}

/* Bookmarks Section Styles */
.bookmarks-section {
    padding-top: 0.5rem;
}

/* ── Dense view toggle button ── */
.bookmarks-toolbar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-bottom: 1.5rem;
    gap: 8px;
}

.density-btn {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 8px;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 7px 12px;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    white-space: nowrap;
}

.density-btn:hover {
    color: var(--text-primary);
    border-color: var(--accent-color);
}

.density-btn.active {
    background: var(--accent-color);
    color: #fff;
    border-color: var(--accent-color);
}

/* ── Dense mode overrides ── */
.bookmarks-container.dense {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
}

.bookmarks-container.dense .bookmark-category {
    padding: 12px 14px;
    border-radius: 8px;
}

.bookmarks-container.dense .category-header {
    font-size: 0.8rem;
    margin-bottom: 8px;
    padding-bottom: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

.bookmarks-container.dense .bookmark-list {
    gap: 2px;
}

.bookmarks-container.dense .bookmark-item {
    font-size: 0.82rem;
    padding: 2px 0;
    line-height: 1.4;
}

.bookmarks-header {
    text-align: center;
    margin-bottom: 1.5rem;
}

.bookmarks-header h2 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(90deg, #03dac6, var(--accent-color));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.bookmarks-search {
    margin-bottom: 2rem;
}

.bookmarks-search input {
    width: 100%;
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    background-color: var(--input-bg);
    color: var(--text-primary);
    font-size: 0.95rem;
    outline: none;
    box-shadow: var(--shadow);
}

.bookmarks-search input::placeholder {
    color: var(--text-secondary);
}

.bookmarks-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.bookmark-category {
    background-color: var(--card-bg);
    border-radius: 10px;
    padding: 20px;
    box-shadow: var(--shadow);
}

.bookmark-category.hidden {
    display: none;
}

.category-header {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid;
}

.bookmark-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.bookmark-item {
    color: var(--text-primary);
    text-decoration: none;
    font-size: 0.95rem;
    transition: color 0.2s, transform 0.2s;
    display: block;
    padding: 4px 0;
}

.bookmark-item:hover {
    transform: translateX(5px);
    opacity: 0.8;
}

.bookmark-item.hidden {
    display: none;
}

.no-results {
    text-align: center;
    color: var(--text-secondary);
    padding: 40px 20px;
    font-size: 1.1rem;
    display: none;
}

.no-results.show {
    display: block;
}

footer {
    text-align: center;
    margin-top: 3rem;
    color: var(--text-secondary);
    font-size: 0.9rem;
}

footer i {
    color: #ff5555;
}

@media (max-width: 600px) {
    .search-options {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    }
    
    .bookmarks-container {
        grid-template-columns: 1fr;
    }
    
    h1 {
        font-size: 2rem;
    }
}
    </style>

        </div>

            </main>
        </div>

        <footer>

    { name: "⚖️ Legislation.gov.uk", url: "https://www.legislation.gov.uk", category: "UK Legal Resources", tags: ["legal", "statutes", "acts", "primary legislation", "government"] },
    { name: "📜 BAILII", url: "https://www.bailii.org", category: "UK Legal Resources", tags: ["legal", "case law", "judgments", "courts", "tribunals"] },
    { name: "⚖️ UK Supreme Court", url: "https://www.supremecourt.uk", category: "UK Legal Resources", tags: ["legal", "case law", "judgments", "courts", "appeals"] },
    { name: "📋 Judiciary UK", url: "https://www.judiciary.uk", category: "UK Legal Resources", tags: ["legal", "courts", "judgments", "sentencing", "guidance"] },
    { name: "🔍 LawCom.gov.uk", url: "https://lawcom.gov.uk", category: "UK Legal Resources", tags: ["legal", "law reform", "reports", "consultations", "commission"] },
    { name: "📖 UK Parliament", url: "https://www.parliament.uk/business/publications", category: "UK Legal Resources", tags: ["legal", "bills", "statutes", "parliamentary", "debates"] },
    
    // Art 
    { name: "🖌️ Canva", url: "https://www.canva.com", category: "Art", tags: ["design", "graphics", "art"] }
];

// Category colors
const categoryColors = {
    "Entertainment": "#f1ff2e",
    "Prudence": "#f85d5d",
    "Programming": "#05993e",
    "Reading": "#ff9d4d",
    "Words": "#71a7fe",
    "Social Media": "#9466ff",
    "Money": "#80ffb0",
    "Gaming": "#ffa8ef",
    "AI Chat": "#0a74ff",
    "Shopping": "#f7ff80",
    "Tools": "#adadad"
};

// ── Section switching ──
function showSection(section) {
    document.getElementById('panel-bookmarks').classList.toggle('visible', section === 'bookmarks');
    document.getElementById('panel-search').classList.toggle('visible', section === 'search');
    document.getElementById('btn-bookmarks').classList.toggle('active', section === 'bookmarks');
    document.getElementById('btn-search').classList.toggle('active', section === 'search');

    // Auto-focus search input when switching to search
    if (section === 'search') {
        setTimeout(() => document.getElementById('search-input').focus(), 50);
    }
}

// DOM elements
const searchInput = document.getElementById('search-input');
const searchButton = document.getElementById('search-button');
const searchOptionsContainer = document.querySelector('.search-options');
const bookmarksSearchInput = document.getElementById('bookmarks-search-input');
const bookmarksContainer = document.getElementById('bookmarks-container');
const noResults = document.getElementById('no-results');

function init() {
    renderSearchOptions();
    renderBookmarks();
    setupEventListeners();
    // Restore saved density preference
    if (localStorage.getItem('bookmarksDense') === 'true') {
        bookmarksContainer.classList.add('dense');
        document.getElementById('density-toggle').classList.add('active');
        document.getElementById('density-label').textContent = 'Comfortable';
        document.querySelector('#density-toggle i').className = 'fas fa-th-large';
    }
}

function renderSearchOptions() {
    searchOptionsContainer.innerHTML = '';
    searchOptions.forEach(option => {
        const optionElement = document.createElement('div');
        optionElement.className = 'search-option';
        optionElement.dataset.url = option.url;
        optionElement.dataset.home = option.home || option.url;
        optionElement.innerHTML = `
            <i class="${option.icon}" style="color: ${option.color}"></i>
            <span class="name">${option.name}</span>
        `;
        searchOptionsContainer.appendChild(optionElement);
    });
}

function renderBookmarks() {
    bookmarksContainer.innerHTML = '';
    const bookmarksByCategory = {};
    bookmarks.forEach(bookmark => {
        if (!bookmarksByCategory[bookmark.category]) {
            bookmarksByCategory[bookmark.category] = [];
        }
        bookmarksByCategory[bookmark.category].push(bookmark);
    });

    Object.keys(bookmarksByCategory).forEach(category => {
        const categoryCard = document.createElement('div');
        categoryCard.className = 'bookmark-category';
        categoryCard.dataset.category = category;

        const categoryColor = categoryColors[category] || '#808080';

        const categoryHeader = document.createElement('div');
        categoryHeader.className = 'category-header';
        categoryHeader.style.borderColor = categoryColor;
        categoryHeader.style.color = categoryColor;
        categoryHeader.textContent = category;

        const bookmarkList = document.createElement('div');
        bookmarkList.className = 'bookmark-list';

        bookmarksByCategory[category].forEach(bookmark => {
            const bookmarkLink = document.createElement('a');
            bookmarkLink.href = bookmark.url;
            bookmarkLink.className = 'bookmark-item';
            bookmarkLink.target = '_blank';
            bookmarkLink.textContent = bookmark.name;
            bookmarkLink.dataset.name = bookmark.name.toLowerCase();
            bookmarkLink.dataset.tags = bookmark.tags.join(' ').toLowerCase();
            bookmarkLink.style.color = "lightgrey";
            bookmarkList.appendChild(bookmarkLink);
        });

        categoryCard.appendChild(categoryHeader);
        categoryCard.appendChild(bookmarkList);
        bookmarksContainer.appendChild(categoryCard);
    });
}

function filterBookmarks(searchTerm) {
    const term = searchTerm.toLowerCase().trim();
    const categories = document.querySelectorAll('.bookmark-category');
    let visibleCount = 0;

    if (term === '') {
        categories.forEach(category => {
            category.classList.remove('hidden');
            category.querySelectorAll('.bookmark-item').forEach(item => item.classList.remove('hidden'));
        });
        noResults.classList.remove('show');
        return;
    }

    categories.forEach(category => {
        const bookmarkItems = category.querySelectorAll('.bookmark-item');
        let categoryHasVisibleItems = false;

        bookmarkItems.forEach(item => {
            const matches = item.dataset.name.includes(term) || item.dataset.tags.includes(term);
            item.classList.toggle('hidden', !matches);
            if (matches) { categoryHasVisibleItems = true; visibleCount++; }
        });

        category.classList.toggle('hidden', !categoryHasVisibleItems);
    });

    noResults.classList.toggle('show', visibleCount === 0);
}

function setupEventListeners() {
    searchButton.addEventListener('click', () => performSearch());

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
    });

    // Search option clicks — open home if no search term, otherwise search
    document.querySelectorAll('.search-option').forEach(option => {
        option.addEventListener('click', function () {
            const searchTerm = searchInput.value.trim();
            if (!searchTerm) {
                window.open(this.dataset.home, '_blank');
            } else {
                window.open(this.dataset.url + encodeURIComponent(searchTerm), '_blank');
            }
        });
    });

    bookmarksSearchInput.addEventListener('input', (e) => {
        filterBookmarks(e.target.value);
    });

    // Density toggle
    document.getElementById('density-toggle').addEventListener('click', function () {
        const isDense = bookmarksContainer.classList.toggle('dense');
        this.classList.toggle('active', isDense);
        document.getElementById('density-label').textContent = isDense ? 'Comfortable' : 'Compact';
        this.querySelector('i').className = isDense ? 'fas fa-th-large' : 'fas fa-grip-lines';
        localStorage.setItem('bookmarksDense', isDense);
    });
}

function performSearch() {
    const searchTerm = searchInput.value.trim();
    if (!searchTerm) {
        searchInput.focus();
        return;
    }
    window.open(searchOptions[0].url + encodeURIComponent(searchTerm), '_blank');
}

document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
